{% extends 'base.html' %}
{% load static %}
{% block header %}

      <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
          <div class="col-md-9 ftco-animate text-center">
          	<p class="breadcrumbs"><span class="mr-2"><a href="index.html">Home</a></span> <span>Add Stock</span></p>
            <h1 class="mb-0 bread">Add Stock</h1>

        </div>
      </div>

<form method="post" >
